# Service URLs
ml_service_url: "http://ml-service:6050"
wbia_core_url: "http://wbia-core:5000"

# Model IDs (match model_config_poc.json)
predict_model_id: "yolo11n"
extract_model_id: "miewid-hf-v3"

# Detection thresholds
predict_params:
  conf: 0.25

# WBIA 10.9/10.10 URL
wbia_url: "http://wbia:5000"

# wbia-core HotSpotter config (for identify pipeline)
identify_config:
  pipeline_root: "vsmany"
  K: 4
  Knorm: 1
  Kpad: 0
  score_method: "nsum"
  fg_on: false
  sv_on: false
  flann_algorithm: "kdtree"

# Limit database size for identify calls (avoids base64 payload explosion)
max_db_entries: 30

# COCO dataset
coco_json_path: "/app/tests/test-dataset/annotations/instances_train2020.json"
coco_images_path: "/app/tests/test-dataset/images"

# Subset options
n_images: 10
n_query: 3
seed: 42

# Output
output_path: "/app/data/04_report/results.json"
output_path_109: "/app/data/04_report/results_109.json"
output_path_coco: "/app/data/04_report/results_coco.json"
output_path_newml: "/app/data/04_report/results_newml.json"
output_path_mlsc: "/app/data/04_report/results_mlsc.json"

# Feature store (new_ml pipeline stub)
feature_store_csv: "/app/data/05_features/chips.csv"

# -------- new_ml pipeline (opencv + ONNX) --------

# HuggingFace model repos
onnx_model_dir: "/app/models"
onnx_yolo_model: "model.onnx"
onnx_yolo_repo: "onnx-community/yolo26n-ONNX"
onnx_yolo_subdir: "onnx"
onnx_miewid_model: "miewid.onnx"
onnx_miewid_repo: "james-burgess/wildbook"

# YOLO detection
yolo_imgsz: 640
yolo_conf_threshold: 0.25
yolo_nms_threshold: 0.45
yolo_class_filter: []  # empty = all classes; [22, 23] = zebra + giraffe only

# CLIP zero-shot species classification
species_labels:
  - plains_zebra
  - grevys_zebra
  - reticulated_giraffe
  - masai_giraffe

# MiewID embedding
miewid_imgsz: 440

# FAISS index directory
faiss_index_dir: "/app/data/09_index"
